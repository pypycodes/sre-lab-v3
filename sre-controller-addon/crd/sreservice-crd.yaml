apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sreservices.demo.ct.com
spec:
  group: demo.ct.com
  scope: Namespaced
  names:
    plural: sreservices
    singular: sreservice
    kind: SREService
    shortNames:
      - sresvc
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - owner
                - team
                - availabilitySLO
              properties:
                owner:
                  type: string
                team:
                  type: string
                availabilitySLO:
                  type: string
                latencySLO:
                  type: string
                errorRateSLO:
                  type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                phase:
                  type: string
                message:
                  type: string
                configMapName:
                  type: string
