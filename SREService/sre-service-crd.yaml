# sre-service-crd.yaml

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: sreservices.demo.ct.com

spec:
  group: demo.ct.com

  names:
    plural: sreservices
    singular: sreservice
    kind: SREService

  scope: Namespaced

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              properties:
                team:
                  type: string

                slo:
                  type: string

                owner:
                  type: string